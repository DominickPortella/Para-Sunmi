<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Sunmi 💛</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="intro-portal">
        <svg id="sobre-svg" viewBox="0 0 200 133">
            <path id="sobre-contorno" d="M10,123 L190,123 L190,10 L10,10 Z" />
            <path id="sobre-tapa" d="M10,10 L100,70 L190,10" />
        </svg>
        <div id="luz"></div>
    </div>

    <div id="constelacion-msg"></div>
    <div class="overlay" id="overlay" onclick="cerrarCarta()"></div>

    <div class="container" id="main-container">
        <div id="contenedor-abrazo">
            <div id="msg-abrazo">¡Te mando amor!</div>
            <div id="btn-abrazo" onclick="toggleAbrazo()">🫂</div>
        </div>

        <svg id="girasol-svg" viewBox="0 0 200 260">
            <rect x="97" y="140" width="6" height="100" fill="#2e7d32" />
            <ellipse cx="70" cy="180" rx="25" ry="12" fill="#388e3c" transform="rotate(-30 70 180)" />
            <ellipse cx="130" cy="200" rx="25" ry="12" fill="#388e3c" transform="rotate(30 130 200)" />
            <g id="cabeza-girasol">
                <g fill="#f4b400">
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(0 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(45 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(90 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(135 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(180 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(225 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(270 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(315 100 100)" />
                </g>
                <circle cx="100" cy="100" r="35" fill="#3e2723" />
                <circle cx="85" cy="90" r="8" class="ojo" />
                <circle cx="85" cy="90" r="4" class="pupila" id="p-izq" />
                <circle cx="115" cy="90" r="8" class="ojo" />
                <circle cx="115" cy="90" r="4" class="pupila" id="p-der" />
            </g>
        </svg>

        <div id="reloj-contenedor">
            <div id="reloj-titulo">Haciendo mi vida más bella hace...</div>
            <div id="contador">
                <div class="tiempo-unidad"><span id="d">00</span><span class="tiempo-label">Días</span></div>
                <div class="tiempo-unidad"><span id="h">00</span><span class="tiempo-label">Hrs</span></div>
                <div class="tiempo-unidad"><span id="m">00</span><span class="tiempo-label">Min</span></div>
                <div class="tiempo-unidad"><span id="s">00</span><span class="tiempo-label">Seg</span></div>
            </div>
        </div>
    </div>

    <div class="carta" id="carta">
        <div class="lazo-regalo" onclick="abrirLazo()">
            <div class="lazo-v"></div>
            <div class="lazo-h"></div>
            <div class="moño">🎁</div>
        </div>
        <div class="contenido-carta">
            <h3 style="color: #d81b60; margin: 0; font-family: 'Dancing Script'; font-size: 2rem;">Sunmi 💖</h3>
            <p id="mensaje-texto" style="color: #444; margin-top: 20px; font-size: 1rem; line-height: 1.5;"></p>
            <button onclick="cerrarCarta()"
                style="background: #d81b60; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; margin-top: 15px; font-weight: 600; font-family: 'Poppins';">Guardar
                con amor</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
