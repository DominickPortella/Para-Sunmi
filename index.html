<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Sunmi 💛</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            transition: background 2s ease;
            touch-action: none;
        }

        /* --- FONDOS DINÁMICOS --- */
        body.modo-dia { background: radial-gradient(circle, #fff, #fce4ec, #f8bbd0); }
        body.modo-noche { background: radial-gradient(circle at bottom, #020111 10%, #191970 50%, #000033 100%); }

        .container { position: relative; width: 100vw; height: 100vh; opacity: 0; transition: opacity 2s ease; z-index: 10; display: none;}
        .container.active { opacity: 1; display: flex;}

        /* --- RELOJ INTELIGENTE --- */
        #reloj-contenedor {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #424242;
            z-index: 15;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 85%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 1s;
        }
        body.modo-noche #reloj-contenedor { background: rgba(0, 0, 0, 0.4); color: #eee; border: 1px solid rgba(255, 255, 255, 0.2); }
        body.modo-noche #contador { color: #fff; }
        body.modo-noche .tiempo-label { color: #aaa; }
        #reloj-titulo { font-size: 0.8rem; margin-bottom: 10px; color: #d81b60; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        #contador { font-size: 1.2rem; font-weight: 600; display: flex; justify-content: center; gap: 15px; color: #111; }
        .tiempo-unidad { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
        .tiempo-label { font-size: 0.55rem; text-transform: uppercase; color: #666; margin-top: 4px; font-weight: 400; }

        /* --- BOTÓN DEL ABRAZO --- */
        #contenedor-abrazo { position: fixed; right: 25px; bottom: 25px; z-index: 150; display: flex; flex-direction: column; align-items: center; }
        #btn-abrazo { width: 65px; height: 65px; background: #ff4081; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3); user-select: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 3px solid white; }
        #btn-abrazo.activo { background: #c2185b; transform: scale(1.1) rotate(15deg); }
        #msg-abrazo { background: white; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; font-weight: 600; color: #d81b60; opacity: 0; transform: translateY(10px); transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); white-space: nowrap; pointer-events: none; }
        #msg-abrazo.visible { opacity: 1; transform: translateY(0); }

        .corazon-vuelo { position: fixed; pointer-events: none; z-index: 99; animation: volarCorazon 2s ease-out forwards; }
        @keyframes volarCorazon {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10vh) scale(1.2) rotate(10deg); }
            100% { transform: translateY(-110vh) translateX(calc(-100px + 200px * var(--rnd))) scale(0.5) rotate(var(--rot)); opacity: 0; }
        }

        /* --- GIRASOL Y ELEMENTOS --- */
        #constelacion-msg { position: fixed; top: 22%; left: 50%; transform: translate(-50%, -50%); font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #bf00ff; text-shadow: 0 0 15px #bf00ff; opacity: 0; z-index: 80; text-align: center; pointer-events: none; transition: opacity 1.2s ease; width: 90%; }
        #girasol-svg { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 140px; z-index: 10; }
        #cabeza-girasol { transform-origin: 100px 100px; transition: transform 0.2s ease-out; }
        .ojo { fill: white; stroke: black; stroke-width: 2; }
        .pupila { fill: black; }
        .rosa-mensaje { position: absolute; cursor: pointer; z-index: 25; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.4)); }
        .floating { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(8deg); } }

        /* --- NUEVA CARTA CON LAZO (ANIMACIÓN PROFESIONAL) --- */
        .carta { 
            position: fixed; top: 50%; left: 50%; 
            width: 80%; max-width: 280px; min-height: 180px;
            background: white; border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            z-index: 250; text-align: center;
            display: none; transform-style: preserve-3d;
            padding: 30px;
        }
        
        /* Animación de entrada de avión */
        @keyframes vueloAvion {
            0% { transform: translate(var(--start-x), var(--start-y)) rotate(45deg) scale(0.2); opacity: 0; }
            70% { transform: translate(-50%, -50%) rotate(-10deg) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 1; }
        }

        .carta.vuelo { display: block; animation: vueloAvion 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* El Lazo */
        .lazo-regalo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 300; pointer-events: auto; cursor: pointer;
            transition: 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        .lazo-v { position: absolute; left: 50%; width: 30px; height: 100%; background: #d81b60; transform: translateX(-50%); border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .lazo-h { position: absolute; top: 50%; width: 100%; height: 30px; background: #d81b60; transform: translateY(-50%); border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .moño { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: #c2185b; border-radius: 50%; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .carta.abierta .lazo-regalo { transform: scale(2) rotate(20deg); opacity: 0; pointer-events: none; }
        .contenido-carta { opacity: 0; transition: 0.5s 0.6s; transform: translateY(20px); }
        .carta.abierta .contenido-carta { opacity: 1; transform: translateY(0); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 190; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }

        .estrella { position: fixed; pointer-events: none; z-index: 1000; color: #fff; font-size: 22px; animation: glow-star 0.8s ease-out forwards; }
        @keyframes glow-star { 0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } }
        .petalo { position: fixed; top: -10%; pointer-events: none; z-index: 5; border-radius: 0% 100% 35% 100%; animation: caer linear forwards; }
        @keyframes caer { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        
        /* Intro Portal */
        #intro-portal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; z-index: 300; }
        #intro-portal.inactive { opacity: 0; visibility: hidden; transition: 1.5s; }
        #sobre-svg { width: 140px; }
        #sobre-contorno { fill: none; stroke: #fff; stroke-width: 3; stroke-dasharray: 600; stroke-dashoffset: 600; animation: dibujar 2s ease forwards 0.5s; }
        @keyframes dibujar { to { stroke-dashoffset: 0; } }
        #sobre-tapa { fill: none; stroke: #fff; stroke-width: 3; transform-origin: top; transition: 1.2s ease 2.2s; }
        #intro-portal.open #sobre-tapa { transform: rotateX(150deg); }
        #luz { position: absolute; width: 100%; height: 100%; background: #ff007f; opacity: 0; transition: 1s ease 3.2s; }
        #intro-portal.glow #luz { opacity: 1; }
    </style>
</head>
<body>

    <div id="intro-portal">
        <svg id="sobre-svg" viewBox="0 0 200 133">
            <path id="sobre-contorno" d="M10,123 L190,123 L190,10 L10,10 Z" />
            <path id="sobre-tapa" d="M10,10 L100,70 L190,10" />
        </svg>
        <div id="luz"></div>
    </div>

    <div id="constelacion-msg"></div>
    <div class="overlay" id="overlay" onclick="cerrarCarta()"></div>

    <div class="container" id="main-container">
        <div id="contenedor-abrazo">
            <div id="msg-abrazo">¡Te mando amor!</div>
            <div id="btn-abrazo" onclick="toggleAbrazo()">🫂</div>
        </div>

        <svg id="girasol-svg" viewBox="0 0 200 260">
            <rect x="97" y="140" width="6" height="100" fill="#2e7d32" />
            <ellipse cx="70" cy="180" rx="25" ry="12" fill="#388e3c" transform="rotate(-30 70 180)" />
            <ellipse cx="130" cy="200" rx="25" ry="12" fill="#388e3c" transform="rotate(30 130 200)" />
            <g id="cabeza-girasol">
                <g fill="#f4b400">
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(0 100 100)" /><ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(45 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(90 100 100)" /><ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(135 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(180 100 100)" /><ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(225 100 100)" />
                    <ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(270 100 100)" /><ellipse cx="100" cy="45" rx="12" ry="35" transform="rotate(315 100 100)" />
                </g>
                <circle cx="100" cy="100" r="35" fill="#3e2723" />
                <circle cx="85" cy="90" r="8" class="ojo"/><circle cx="85" cy="90" r="4" class="pupila" id="p-izq"/>
                <circle cx="115" cy="90" r="8" class="ojo"/><circle cx="115" cy="90" r="4" class="pupila" id="p-der"/>
            </g>
        </svg>

        <div id="reloj-contenedor">
            <div id="reloj-titulo">Haciendo mi vida más bella hace...</div>
            <div id="contador">
                <div class="tiempo-unidad"><span id="d">00</span><span class="tiempo-label">Días</span></div>
                <div class="tiempo-unidad"><span id="h">00</span><span class="tiempo-label">Hrs</span></div>
                <div class="tiempo-unidad"><span id="m">00</span><span class="tiempo-label">Min</span></div>
                <div class="tiempo-unidad"><span id="s">00</span><span class="tiempo-label">Seg</span></div>
            </div>
        </div>
    </div>

    <div class="carta" id="carta">
        <div class="lazo-regalo" onclick="abrirLazo()">
            <div class="lazo-v"></div>
            <div class="lazo-h"></div>
            <div class="moño">🎁</div>
        </div>
        <div class="contenido-carta">
            <h3 style="color: #d81b60; margin: 0; font-family: 'Dancing Script'; font-size: 2rem;">Sunmi 💖</h3>
            <p id="mensaje-texto" style="color: #444; margin-top: 20px; font-size: 1rem; line-height: 1.5;"></p>
            <button onclick="cerrarCarta()" style="background: #d81b60; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; margin-top: 15px; font-weight: 600; font-family: 'Poppins';">Guardar con amor</button>
        </div>
    </div>

    <script>
        const fechaInicio = new Date(2026, 2, 11); 
        function actualizarReloj() {
            const ahora = new Date(); 
            const diffMilisegundos = ahora - fechaInicio;
            const diasTotales = Math.floor(diffMilisegundos / (1000 * 60 * 60 * 24));
            const horasActuales = ahora.getHours();
            document.getElementById('d').innerText = diasTotales.toString().padStart(2, '0');
            document.getElementById('h').innerText = horasActuales.toString().padStart(2, '0');
            document.getElementById('m').innerText = ahora.getMinutes().toString().padStart(2, '0');
            document.getElementById('s').innerText = ahora.getSeconds().toString().padStart(2, '0');
            if (horasActuales >= 18 || horasActuales < 6) {
                document.body.classList.add('modo-noche');
                document.body.classList.remove('modo-dia');
            } else {
                document.body.classList.add('modo-dia');
                document.body.classList.remove('modo-noche');
            }
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        const main = document.getElementById('main-container');
        const mensajesRosas = ["Eres el verso más lindo de mi poema favorito. ✨", "Tu sonrisa ilumina mi mundo más que el sol. ❤️", "Tu amor es mi calma en la tormenta. 🌊", "Eres mi sol, mi luna y mis estrellas. 🌙", "Amo la paz que siento a tu lado. 🏠", "Gracias por cada risa compartida. 💍", "Mi corazón late de alegría por ti. 🌹", "Te quiero hoy y para siempre. 💖"];

        function crearRosas() {
            const numRosas = 8;
            const posiciones = [];
            for (let i = 0; i < numRosas; i++) {
                let x, y, traslape, intentos = 0;
                do {
                    traslape = false; x = Math.random() * 70 + 15; y = Math.random() * 55 + 15;
                    if (x > 35 && x < 65 && y > 35 && y < 65) traslape = true;
                    for (let p of posiciones) {
                        if (Math.sqrt(Math.pow(x-p.x,2) + Math.pow(y-p.y,2)) < 18) traslape = true;
                    }
                    intentos++;
                } while (traslape && intentos < 100);
                posiciones.push({x, y});
                const rosa = document.createElement('div');
                rosa.className = 'rosa-mensaje floating';
                rosa.style.left = x + '%'; rosa.style.top = y + '%';
                rosa.innerHTML = `<svg width="55" height="55" viewBox="0 0 100 100" onclick="abrirCarta(${i})"><g fill="#ff1744"><circle cx="50" cy="35" r="22" /><circle cx="72" cy="50" r="22" /><circle cx="50" cy="65" r="22" /><circle cx="28" cy="50" r="22" /><circle cx="50" cy="50" r="12" fill="#b71c1c" /></g><path d="M50 75 L50 95" stroke="#2e7d32" stroke-width="6" /></svg>`;
                main.appendChild(rosa);
            }
        }

        // Lógica de apertura con animación profesional
        function abrirCarta(i) {
            const carta = document.getElementById("carta");
            const overlay = document.getElementById("overlay");
            
            // Determinar lado aleatorio para el vuelo
            const rand = Math.random();
            const startX = rand < 0.5 ? "-150vw" : "150vw";
            const startY = (Math.random() * 100 - 50) + "vh";
            
            carta.style.setProperty('--start-x', startX);
            carta.style.setProperty('--start-y', startY);
            
            document.getElementById("mensaje-texto").innerText = mensajesRosas[i];
            carta.classList.remove("abierta"); // Resetear lazo
            carta.classList.add("vuelo");
            overlay.classList.add("active");
        }

        function abrirLazo() {
            document.getElementById("carta").classList.add("abierta");
            if(navigator.vibrate) navigator.vibrate([30, 50]);
        }

        function cerrarCarta() {
            const carta = document.getElementById("carta");
            carta.classList.remove("vuelo", "abierta");
            document.getElementById("overlay").classList.remove("active");
        }

        // --- INTERRUPTOR DE ABRAZOS ---
        let lluviaActiva = false;
        let intervaloCorazones;
        const frasesAbrazo = ["¡Lluvia de amor! 💖", "¡Muchos besos! 💋", "¡No te suelto! 🫂", "¡Te extraño! ✨", "¡Eres mi todo! 🌸"];
        
        function toggleAbrazo() {
            const btn = document.getElementById('btn-abrazo');
            const msg = document.getElementById('msg-abrazo');
            lluviaActiva = !lluviaActiva;
            if (lluviaActiva) {
                btn.classList.add('activo');
                msg.classList.add('visible');
                msg.innerText = frasesAbrazo[Math.floor(Math.random() * frasesAbrazo.length)];
                intervaloCorazones = setInterval(crearCorazonVuelo, 200);
                if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
            } else {
                btn.classList.remove('activo');
                msg.classList.remove('visible');
                clearInterval(intervaloCorazones);
            }
        }

        function crearCorazonVuelo() {
            const c = document.createElement('div');
            c.className = 'corazon-vuelo';
            const tipos = ['❤️','💖','💗','💘','🌸','💌'];
            c.innerHTML = tipos[Math.floor(Math.random() * tipos.length)];
            c.style.right = (Math.random() * 40 + 30) + 'px';
            c.style.bottom = '40px';
            c.style.setProperty('--rnd', Math.random());
            c.style.setProperty('--rot', (Math.random() * 360) + 'deg');
            c.style.fontSize = (Math.random() * 15 + 20) + 'px';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 2000);
        }

        // --- INTERACCIONES GIRASOL ---
        const cabeza = document.getElementById('cabeza-girasol'), pi = document.getElementById('p-izq'), pd = document.getElementById('p-der'), cMsg = document.getElementById('constelacion-msg');
        const frasesC = ["Eres mi hogar", "Mi eterno amor", "Mi milagro", "Por siempre tú", "Eres mi sueño"];
        let idxC = 0, timerI;

        function mover(x, y) {
            if (!main.classList.contains('active')) return;
            cMsg.style.opacity = "0"; clearTimeout(timerI);
            const est = document.createElement('div');
            est.className = 'estrella'; est.innerHTML = '✦';
            est.style.left = x + 'px'; est.style.top = y + 'px';
            if (document.body.classList.contains('modo-noche')) { est.style.textShadow = "0 0 15px #fff"; }
            document.body.appendChild(est);
            setTimeout(() => est.remove(), 800);
            const r = cabeza.getBoundingClientRect(), cx = r.left + r.width / 2, cy = r.top + r.height / 2, a = Math.atan2(y - cy, x - cx);
            cabeza.style.transform = `rotate(${a * 180 / Math.PI + 90}deg)`;
            const ox = Math.cos(a) * 3, oy = Math.sin(a) * 3;
            pi.setAttribute('cx', 85 + ox); pd.setAttribute('cx', 115 + ox);
            pi.setAttribute('cy', 90 + oy); pd.setAttribute('cy', 90 + oy);
            timerI = setTimeout(() => { cMsg.innerText = frasesC[idxC]; cMsg.style.opacity = "1"; idxC = (idxC + 1) % frasesC.length; }, 3000);
        }

        window.addEventListener('mousemove', e => mover(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => mover(e.touches[0].clientX, e.touches[0].clientY));

        setInterval(() => {
            if (!main.classList.contains('active')) return;
            const p = document.createElement('div');
            p.className = 'petalo';
            p.style.width = p.style.height = (Math.random() * 10 + 12) + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = '#ff1744';
            const dur = Math.random() * 3 + 2.5;
            p.style.animationDuration = dur + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), dur * 1000);
        }, 300);

        const intro = document.getElementById('intro-portal');
        setTimeout(() => intro.classList.add('open'), 1000);
        setTimeout(() => intro.classList.add('glow'), 2500);
        setTimeout(() => { intro.classList.add('inactive'); main.classList.add('active'); crearRosas(); }, 4200);
    </script>
</body>
</html>
